version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # The remaining entries have open-pull-requests-limit set to 0, which disables
  # scheduled version update PRs. Dependabot Security Updates (enabled in repo
  # settings) still creates PRs for known vulnerabilities independently of this
  # file. We keep these entries so that security update PRs inherit the custom
  # labels below, making triage easier. Routine dependency upgrades are handled
  # manually during Asherah SDK release prep.
  #
  # See: https://docs.github.com/en/code-security/dependabot/dependabot-security-updates/customizing-dependabot-security-prs

  # Go AppEncryption - security updates only
  - package-ecosystem: "gomod"
    directories:
      - "/go/appencryption"
      - "/go/appencryption/integrationtest"
    labels:
      - "go"
      - "dependencies"
      - "appencryption"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # Go SecureMemory - security updates only
  - package-ecosystem: "gomod"
    directory: "/go/securememory"
    labels:
      - "go"
      - "dependencies"
      - "securememory"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # Remaining Go projects - security updates only
  - package-ecosystem: "gomod"
    directories:
      - "/server/go"
      - "/tests/cross-language/go"
    labels:
      - "go"
      - "dependencies"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # .NET Logging - security updates only
  - package-ecosystem: "nuget"
    directories:
      - "/csharp/Logging"
    labels:
      - "c#"
      - "dependencies"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # .NET SecureMemory - security updates only
  - package-ecosystem: "nuget"
    directories:
      - "/csharp/SecureMemory"
    labels:
      - "c#"
      - "dependencies"
      - "securememory"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # .NET AppEncryption - security updates only
  - package-ecosystem: "nuget"
    directories:
      - "/csharp/AppEncryption"
    labels:
      - "c#"
      - "dependencies"
      - "appencryption"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # Java SecureMemory - security updates only
  - package-ecosystem: "maven"
    directory: "/java/secure-memory"
    labels:
      - "java"
      - "dependencies"
      - "securememory"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # Java AppEncryption - security updates only
  - package-ecosystem: "maven"
    directory: "/java/app-encryption"
    labels:
      - "java"
      - "dependencies"
      - "appencryption"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  # Remaining Java projects - security updates only
  - package-ecosystem: "maven"
    directories:
      - "/server/java"
      - "/tests/cross-language/java"
    labels:
      - "java"
      - "dependencies"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
