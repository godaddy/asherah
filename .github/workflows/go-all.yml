name: '[Go] Run All'

on:
  workflow_dispatch:

  # TODO: remove the push trigger before merging
  push:
    paths:
      - 'go/appencryption/**'
      - '.github/workflows/go-*'

jobs:
  build-securememory:
    name: 'SecureMemory: Build'
    uses: ./.github/workflows/go-securememory-build.yml
    strategy:
      matrix:
        go-version: [stable, oldstable]
    with:
      go-version: ${{ matrix.go-version }}

  test-securememory:
    name: 'SecureMemory: Test'
    needs: build-securememory
    uses: ./.github/workflows/go-securememory-test.yml
    strategy:
      matrix:
        go-version: [stable, oldstable]
    with:
      go-version: ${{ matrix.go-version }}

  benchmark-securememory:
    name: 'SecureMemory: Bench'
    needs: build-securememory
    uses: ./.github/workflows/go-securememory-bench.yml
    strategy:
      matrix:
        go-version: [stable, oldstable]
    with:
      go-version: ${{ matrix.go-version }}

  build-appencryption:
    name: 'AppEncryption: Build'
    needs: test-securememory
    uses: ./.github/workflows/go-appencryption-build.yml
    strategy:
      matrix:
        go-version: [stable, oldstable]
    with:
      go-version: ${{ matrix.go-version }}

  test-appencryption:
    name: 'AppEncryption: Test'
    needs: build-appencryption
    uses: ./.github/workflows/go-appencryption-test.yml
    strategy:
      matrix:
        go-version: [stable, oldstable]
    with:
      go-version: ${{ matrix.go-version }}

  integration-appencryption:
    name: 'AppEncryption: Integration'
    needs: test-appencryption
    uses: ./.github/workflows/go-appencryption-integration.yml
    strategy:
      matrix:
        go-version: [stable, oldstable]
    with:
      go-version: ${{ matrix.go-version }}

  benchmark-appencryption:
    name: 'AppEncryption: Bench'
    needs: test-appencryption
    uses: ./.github/workflows/go-appencryption-bench.yml
    strategy:
      matrix:
        go-version: [stable, oldstable]
    with:
      go-version: ${{ matrix.go-version }}

  reference-app:
    name: 'Reference App: Build and Lint'
    needs: test-appencryption
    runs-on: ubuntu-latest
    container:
      image: golang:latest
      options: --ulimit core=-1 --ulimit memlock=-1:-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Add workspace to safe.directory  # needed for VCS stamping
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Go
        uses: actions/setup-go@cdcb36043654635271a94b9a6d1392de5bb323a7 # v5.0.1
        with:
          go-version: stable
          cache-dependency-path: |
            go/*/go.sum
            samples/go/referenceapp/go.sum

      - name: Install dependencies
        run: |
          cd samples/go/referenceapp
          go get .
          go install gotest.tools/gotestsum@latest

      - name: Build
        run: |
          cd samples/go/referenceapp
          ./scripts/build.sh

      - name: Run linters
        run: |
          cd samples/go/referenceapp
          ./scripts/lint.sh
